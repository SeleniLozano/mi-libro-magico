<!DOCTYPE html>
<html>
  <head>
    <title>Safari Magico</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>
  </head>
  <body style="margin: 0; overflow: hidden;">
    <a-scene embedded arjs="sourceType: webcam; detectionMode: mono_and_matrix; matrixCodeType: 3x3;">
      
      <a-assets>
        <a-asset-item id="m-leon" src="leon.glb"></a-asset-item>
        <a-asset-item id="m-bebe" src="leon_bebe.glb"></a-asset-item>
        <a-asset-item id="m-guaca" src="guacamaya.glb"></a-asset-item>
        <a-asset-item id="m-jira" src="jirafa.glb"></a-asset-item>
        <a-asset-item id="m-leo" src="leopardo.glb"></a-asset-item>
        <a-asset-item id="m-zebra" src="zebra.glb"></a-asset-item>
        <a-asset-item id="m-coco" src="cocodrilo.glb"></a-asset-item>
        <a-asset-item id="m-ele" src="elefante.glb"></a-asset-item>
      </a-assets>

      <a-marker type="barcode" value="0"><a-entity gltf-model="#m-leon" scale="0.5 0.5 0.5" animation-mixer></a-entity></a-marker>
      <a-marker type="barcode" value="1"><a-entity gltf-model="#m-bebe" scale="0.2 0.2 0.2" animation-mixer></a-entity></a-marker>
      <a-marker type="barcode" value="2"><a-entity gltf-model="#m-guaca" scale="0.4 0.4 0.4" animation-mixer></a-entity></a-marker>
      <a-marker type="barcode" value="3"><a-entity gltf-model="#m-jira" scale="0.6 0.6 0.6" animation-mixer></a-entity></a-marker>
      <a-marker type="barcode" value="4"><a-entity gltf-model="#m-leo" scale="0.5 0.5 0.5" animation-mixer></a-entity></a-marker>
      <a-marker type="barcode" value="5"><a-entity gltf-model="#m-zebra" scale="0.5 0.5 0.5" animation-mixer></a-entity></a-marker>
      <a-marker type="barcode" value="6"><a-entity gltf-model="#m-coco" scale="0.5 0.5 0.5" animation-mixer></a-entity></a-marker>
      <a-marker type="barcode" value="7"><a-entity gltf-model="#m-ele" scale="0.6 0.6 0.6" animation-mixer></a-entity></a-marker>

      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
